<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#fafafa"/>
    
    <!-- Outer Border -->
    <rect x="25" y="25" width="750" height="550" fill="none" stroke="#2c3e50" stroke-width="15"/>
    <rect x="35" y="35" width="730" height="530" fill="none" stroke="#ebdca4" stroke-width="4"/>

    <!-- Header -->
    <text x="400" y="120" font-family="Times New Roman, serif" font-size="44" font-weight="bold" fill="#2c3e50" text-anchor="middle" letter-spacing="4">CERTIFICATE</text>
    <text x="400" y="155" font-family="Times New Roman, serif" font-size="18" fill="#555" text-anchor="middle" letter-spacing="10">OF EXCELLENCE</text>
    
    <!-- Ribbon/Separator -->
    <path d="M 300 180 L 500 180 M 350 188 L 450 188" stroke="#ebdca4" stroke-width="2" fill="none" />
    
    <!-- Context -->
    <text x="400" y="250" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#7f8c8d" text-anchor="middle">This certificate is proudly presented to:</text>
    
    <!-- Student Name Placeholder -->
    <text x="400" y="315" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="bold" font-style="italic" fill="#2980b9" text-anchor="middle">[Student Name]</text>
    
    <!-- Line under name -->
    <line x1="250" y1="330" x2="550" y2="330" stroke="#bdc3c7" stroke-width="1" />
    
    <!-- Course Info -->
    <text x="400" y="380" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#7f8c8d" text-anchor="middle">For successfully completing the program in</text>
    
    <!-- Course Title Placeholder -->
    <text x="400" y="420" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50" text-anchor="middle">[Course Title]</text>

    <!-- Bottom details -->
    <text x="200" y="490" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#34495e" text-anchor="middle">Date:</text>
    <text x="200" y="520" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#34495e" text-anchor="middle">[Date]</text>
    <line x1="120" y1="530" x2="280" y2="530" stroke="#bdc3c7" stroke-width="2" />
    
    <text x="600" y="490" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#34495e" text-anchor="middle">Certificate ID:</text>
    <text x="600" y="520" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#7f8c8d" text-anchor="middle">[ID]</text>
    
    <!-- Simple vector seal -->
    <circle cx="400" cy="500" r="40" fill="#f1c40f"/>
    <circle cx="400" cy="500" r="34" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="400" y="505" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#d35400" text-anchor="middle">Award</text>
</svg>
